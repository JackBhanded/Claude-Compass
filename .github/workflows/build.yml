name: Build Windows app

# Builds Claude Compass.exe and attaches it to the GitHub release whenever you
# push a version tag (e.g. v0.1.0).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write   # needed to attach the .exe to the GitHub release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller PySide6

      - name: Build the .exe
        run: |
          python -m PyInstaller --noconfirm --onefile --windowed `
            --name "Claude Compass" `
            --paths src `
            --collect-submodules claude_compass `
            gui_launcher.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-compass-exe
          path: dist/Claude Compass.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Claude Compass.exe
